<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium View</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* Fullscreen video */
#videoBox {
  display: none;
  width: 100%;
  height: 100vh;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Cookie popup */
#cookiePopup {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 400px;
  background: rgba(20,20,20,0.9);
  backdrop-filter: blur(10px);
  border-radius: 10px;
  padding: 20px;
  text-align: center;
}

button {
  padding: 10px 18px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.accept {
  background: #00ff88;
  color: black;
}

.decline {
  background: red;
  color: white;
}
</style>
</head>

<body>

<div id="videoBox">
  <video id="myVideo" autoplay loop playsinline>
    <source src="0.mp4" type="video/mp4">
  </video>
</div>

<div id="cookiePopup">
  <p>This site uses cookies. Do you accept?</p>
  <button class="accept" onclick="acceptCookies()">Accept</button>
  <button class="decline">Decline</button>
</div>

<script>
const video = document.getElementById("myVideo");

// Agar pehle accept kiya ho
if (localStorage.getItem("cookieAccepted")) {
  document.getElementById("cookiePopup").style.display = "none";
  document.getElementById("videoBox").style.display = "block";
  video.muted = false;
  video.play();
}

function acceptCookies() {
  localStorage.setItem("cookieAccepted", "true");
  document.getElementById("cookiePopup").style.display = "none";
  document.getElementById("videoBox").style.display = "block";

  video.muted = false;
  video.play();
}

// Pause na hone do 😈
video.addEventListener("pause", () => {
  video.play();
});
</script>

</body>
</html>
